# =============================================================================
# README Editor - Application Configuration
# =============================================================================

# Redis Configuration
redis.host=localhost
redis.port=6379
redis.password=
redis.timeout=2000
redis.database=0

# Application Settings
app.name=README Editor
app.version=1.0.0
app.data.dir=${user.home}/.readme-editor

# Auto-Save Configuration
autosave.enabled=true
autosave.interval.ms=5000

# Editor Defaults
editor.default.theme=light
editor.default.font.size=14
editor.tab.size=2

# Export Defaults
export.default.encoding=UTF-8
export.default.line.separator=\n

# Security
security.password.min.length=8
security.bcrypt.rounds=12
security.session.timeout.minutes=60

# Web Server Configuration
server.port=8080

