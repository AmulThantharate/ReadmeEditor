name: Build, Test & Push to GHR

on:
    pull_request:
        branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '25'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        contents: read
    steps: 
        - name: Chekout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
            cache: 'maven'
        - name: Build with Maven
          run: mvn clean package -DskipTests
          env:
            MAVEN_OPTS: -Xmx2048m
        - name: Upload Artifact
          uses: actions/upload-artifact@v4
          with:
            name: build-artifacts
            path: target/*.jar
            retention-days: 7
  
  install:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
        contents: read
    steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
            cache: 'maven'
        - name: Install Maven Dependencies
          run: mvn dependency:resolve dependency:resolve-plugins
        - name: Display Dependecy Tree
          run: mvn dependency:tree

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build, install]
    permissions:
        contents: read
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retires 5
        ports:
         - 6379:6379
    steps:
        - name: Chekout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
            cache: 'maven'
        - name: Run Unit Tests
          run: mvn test
          env:
            REDIS_HOST: localhost
            REDIS_PORT: 6379
        - name: Run Integration test
          run: mvn verify
          env:
            REDIS_HOST: localhost
            REDIS_PORT: 6379
          continue-on-error: true
        - name: Upload Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: surfire-report
            path: target/site/
            retention-days: 7

