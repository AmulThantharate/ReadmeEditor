name: Build, Test & Push to GHR

on:
    pull_request:
        branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '25'

jobs:

  init:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag}}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Tag
        id: meta
        run: |
          TAG="v${GITHUB_RUN_NUMBER}-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    permissions:
        contents: read
    steps: 
        - name: Chekout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
            cache: 'maven'
        - name: Build with Maven
          run: mvn clean package -DskipTests
          env:
            MAVEN_OPTS: -Xmx2048m
        - name: Upload Artifact
          uses: actions/upload-artifact@v4
          with:
            name: build-artifacts
            path: target/*.jar
            retention-days: 7
  
  install:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
        contents: read
    steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
            cache: 'maven'
        - name: Install Maven Dependencies
          run: mvn dependency:resolve dependency:resolve-plugins
        - name: Display Dependecy Tree
          run: mvn dependency:tree

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build, install]
    permissions:
        contents: read
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
         - 6379:6379
    steps:
        - name: Chekout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
            cache: 'maven'
        - name: Run Unit Tests
          run: mvn test
          env:
            REDIS_HOST: localhost
            REDIS_PORT: 6379
        - name: Run Integration test
          run: mvn verify
          env:
            REDIS_HOST: localhost
            REDIS_PORT: 6379
          continue-on-error: true
        - name: Upload Test Result
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: surfire-report
            path: target/site/
            retention-days: 7

  smoke_test:
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: read
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
         - 6379:6379
    steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: Setup JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: ${{ env.JAVA_VERSION }}
            distribution: 'temurin'
        - name: Download Artifact
          uses: actions/download-artifact@v4
          with:
            name: build-artifacts
            path: target
        - name: Start app and wait
          run: |
            java -Dserver.port=8080 -Dredis.host=localhost -Dredis.port=6379 -jar target/readme-editor-1.0.0.jar --server &
            echo $! > app.pid

            timeout 60 bash -c '		
              until curl -fs http://localhost:8080/api/health; do
                sleep 2
              done
            '
        - name: Smoke test
          run: |
            curl -f http://localhost:8080/api/health
            curl -f http://localhost:8080/index.html

        - name: Stop the application
          run: |
            if [ -f app.pid ]; then
              kill $(cat app.pid)
            fi
        
  file_system_scan:
    name: "File System Scan"
    runs-on: ubuntu-latest
    needs: [build, install, test, smoke_test]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tiry
        run: |
          curl -sfL \
          https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
          sh -s -- -b /usr/local/bin

      - name: Run File System Scan
        run: |
          trivy  fs . \
          --format sarif \
          --output trivy-results.sarif
          --serverity CRITICAL,HIGH      

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  
  