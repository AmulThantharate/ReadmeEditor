apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: readme-editor
  namespace: readme-editor
spec:
  destination:
    namespace: readme-editor
    server: https://kubernetes.default.svc
  project: default
  source:
    path: k8s
    repoURL: https://github.com/AmulThantharate/ReadmeEditor.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true