# Nginx Configuration for README Editor
# -----------------------------------------------------------------------------
# This configuration serves static assets directly and proxies API calls to the
# Java backend server running on port 8080.

server {
    listen 80;
    server_name localhost;

    # Maximum file upload size (e.g. for importing large markdown files)
    client_max_body_size 10M;

    # Compression (Gzip) settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # 1. Static Web Assets
    # Points to the directory where static assets (HTML/CSS/JS) are extracted.
    location / {
        # Update this path to the location of your static assets on your server
        root /var/www/readme-editor;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache control for static assets
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. Reverse Proxy for REST API
    # Forwards all /api requests to the running Java backend jar (port 8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS Headers (in case Nginx handles CORS instead of the Java app)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-User-Id' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-User-Id' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        # Keepalive settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Custom Error Pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
